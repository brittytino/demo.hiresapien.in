name: Deploy to Hostinger VPS

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Build Project
        run: npm run build

      - name: Prepare Standalone Deployment
        run: |
          # Next.js standalone mode doesn't include the public or static folders by default in the standalone directory
          # We need to copy them so the standalone server can serve them
          cp -r public .next/standalone/
          cp -r .next/static .next/standalone/.next/
          cp ecosystem.config.js .next/standalone/

      - name: Deploy to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          password: ${{ secrets.VPS_PASSWORD }}
          source: ".next/standalone/*"
          target: "/var/www/datascience.sonascale.hiresapien.com"
          strip_components: 2 # Removes the .next/standalone part from the path on the server

      - name: Restart PM2 and Nginx
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          password: ${{ secrets.VPS_PASSWORD }}
          script: |
            cd /var/www/datascience.sonascale.hiresapien.com
            pm2 reload ecosystem.config.js || pm2 start ecosystem.config.js
            pm2 save
